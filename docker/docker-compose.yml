services:
  dev:
    image: taxbrokerreport-dev
    user: "${UID}:${GID}"
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: dev
    ports:
      - "8080:8080"
    volumes:
      - ..:/workspace
      - ../logs:/var/log/taxbroker
    environment:
      - TBR_LOG_FILE=/var/log/taxbroker/taxbroker.log
    # Capabilities required for debuggers (lldb/gdb) and valgrind to hook into processes
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined
    # Keep standard streams open
    stdin_open: true
    tty: true

  prod:
    image: taxbrokerreport-prod
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: prod
    ports:
      - "8080:8080"
    volumes:
      - taxbroker_logs:/var/log/taxbroker
    environment:
      - TBR_LOG_FILE=/var/log/taxbroker/taxbroker.log

volumes:
  taxbroker_logs:
